services:
  postgres:
    image: postgres:17
    container_name: backend-labs-stage03-postgres
    environment:
      POSTGRES_DB: backend_labs_stage03
      POSTGRES_USER: backend_labs
      POSTGRES_PASSWORD: backend_labs
    ports:
      - "5432:5432"
    volumes:
      - stage03-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backend_labs -d backend_labs_stage03"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  stage03-postgres-data:
