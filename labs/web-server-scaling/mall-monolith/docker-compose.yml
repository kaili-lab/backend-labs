services:
  postgres:
    image: postgres:17
    container_name: mall-monolith-postgres
    environment:
      POSTGRES_DB: mall_monolith
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - mall-monolith-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.4
    container_name: mall-monolith-redis
    ports:
      - "6379:6379"

volumes:
  mall-monolith-postgres-data:
